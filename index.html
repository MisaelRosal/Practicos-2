<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="./CSS/Style.css" rel="stylesheet" />
    <title>Home</title>
  </head>
  <body>
    <header>
      <!-- Agregado: navbar -->
      <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
          <a class="navbar-brand d-flex align-items-center" href="#">
            <img
              src="./Image/Icon-Tec.png"
              alt="Logo"
              class="navbar-logo me-2"
            />
          </a>
          <div class="d-flex flex-column">
            <span class="fw-semibold">DevAcademy</span>
            <small class="text-muted"
              >Cursos tecnologicos y capacitaciones</small
            >
          </div>

          <!-- Agregado: Botón de hamburguesa para móviles -->
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav"
            aria-controls="navbarNav"
            aria-expanded="false"
            aria-label="Toggle navigation"
          >
            <span class="navbar-toggler-icon"></span>
          </button>

          <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-lg-center">
              <li class="nav-item">
                <a class="nav-link active fw-semibold" href="#">Inicio</a>
              </li>
              <li class="nav-item">
                <a class="nav-link fw-semibold" href="#">Cursos</a>
              </li>
              <li class="nav-item">
                <a class="nav-link fw-semibold" href="#">Horario</a>
              </li>
              <li class="nav-item">
                <a class="nav-link fw-semibold" href="#">Contactos</a>
              </li>
              <li class="nav-item">
                <a class="nav-link fw-semibold" href="#">Sobre nosotros</a>
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </header>

    <main class="flex-grow-1">
      <section
        class="hero-section position-relative-relative overflow-hidden text-white"
      >
        <div
          id="heroCarousel"
          class="carousel selide carousel-fade position-absolute top-0 star-0 w-100 h-100"
          data-bs-ride="carousel"
          data-bs-interval="5000"
        >
          <div class="carousel-inner h-100">
            <!--Imagen 1(Activa)-->
            <div class="carousel-item active h-100">
              <div
                class="carousel-bg"
                style="
                  background-image: url(&quot;https://www.indragroup.com/cms-content/2026/04/Foto3.jpg&quot;);
                "
              ></div>
            </div>

            <!--Imagen 2-->
            <div class="carousel-item h-100">
              <div
                class="carousel-bg"
                style="
                  background-image: url(&quot;https://img.magnific.com/fotos-premium/sala-informatica-vacia_13339-121901.jpg?semt=ais_hybrid&w=740&q=80&quot;);
                "
              ></div>
            </div>
            <!--Imagen 3-->
            <div class="carousel-item h-100">
              <div
                class="carousel-bg"
                style="
                  background-image: url(https://upload.wikimedia.org/wikipedia/commons/d/d0/Laboratorio_de_Computo.jpg);
                "
              ></div>
            </div>
          </div>
        </div>

        <!--Contenido fijo-->
        <div class="container position-relative py-5" style="z-index: 3">
          <div class="row aling-item-center g-4">
            <!--Columna izquierda: Mensaje de bienvenida-->
            <div class="col-lg-7 text-start">
              <h1 class="display-5 fw-bold mb-3 hero-title">
                Bienvenido a DevAcademy
              </h1>
              <p class="lead text-white-50 mb-4 hero-lead">
                Explora nuestros cursos prácticos, domina las herramientas más
                demandadas y certifícate hoy mismo con CompuAcademy.
              </p>
              <div class="d-flex flex-wrap gap-3">
                <a href="#" class="btn btn-custom-accent rounded-pill px-4 py-2 fw-medium">
                  Ver Cursos Disponibles
                </a>
                <a href="#" class="btn btn-custom-accent rounded-pill px-4 py-2 fw-medium">
                  Registrate ahora
                </a>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
